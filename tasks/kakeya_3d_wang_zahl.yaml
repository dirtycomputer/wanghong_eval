    ratio: 0.70
    content: |
      关键引理 (仅陈述, 不给证明):
      (a) 管在多尺度下呈 sticky/grains 聚簇结构;
      (b) 存在一个结构定理, 把 grainy 情形与海森堡型构型分情形处理闭合。
    reveals_rubric_items: ["R5", "R6"]
  - level: 5
    label: L5
    ratio: 0.90
    content: |
      证明骨架 (留关键步让你补全):
      离散化 → 识别海森堡障碍 → 尺度归纳 → 每尺度做体积估计 →
      用结构定理闭合 grainy 与海森堡情形 → 组合得到满维 3。请补全各关键步的论证。
    reveals_rubric_items: ["R7"]

