    label: L1
    ratio: 0.15
    content: "可将问题离散化为: δ⁻² 根 δ-分离方向的单位 δ-管的 incidence / 并集体积下界问题 (up to logs)。"
    reveals_rubric_items: ["R1"]
  - level: 2
    label: L2
    ratio: 0.30
    content: "核心障碍是海森堡 (Heisenberg) 型构型 (近似满足三维线性关系、难以用低维方法排除的管簇)。"
    reveals_rubric_items: ["R2"]
  - level: 3
    label: L3
    ratio: 0.50
