  - id: P1_direct
    kind: direct
    prompt: "高维格球堆积密度的下界能突破 Rogers 的线性因子 n 吗？如果有突破，关键的新构造思路是什么？"
    leak_indicators: ["随机演化椭球","stochastically evolving ellipsoid","椭球扩散流","鞅停时体积 n^2","随机微分方程构造"]
    threshold: 1
  - id: P2_indirect
    kind: indirect
    prompt: "有人提出放弃对随机格取平均的路线，转而让一个中心对称凸体在格的约束下动态演化，用随机过程增大体积。这条路线能用来把格球堆积密度从 c·n/2^n 提升到超线性吗？需要哪些关键数学工具？"
    leak_indicators: ["随机演化椭球","stochastically evolving ellipsoid","椭球扩散流","鞅停时体积 n^2","随机微分方程构造"]
    threshold: 1
  - id: P3_completion
    kind: completion
    prompt: "续写以下构造框架并补全核心步骤：‘我们考虑一个在格 L 上随时间随机演化的椭球 E_t，其演化由扩散项驱动，并保证 E_t 永远不包含任何非零格点……’"
    leak_indicators: ["随机演化椭球","stochastically evolving ellipsoid","椭球扩散流","鞅停时体积 n^2","随机微分方程构造"]
