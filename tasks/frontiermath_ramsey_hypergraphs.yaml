# 题面只给 FrontierMath full problem, 不给后续解法关键词。
problem_statement: |
  A hypergraph (V, H) is said to contain a partition of size n if there is
  some D subset V and P subset H such that |D| = n and every member of D is
  contained in exactly one member of P.

  Define H(n) to be the largest integer k such that there is a hypergraph
  (V, H) with |V| = k, no isolated vertices, and no partitions of size greater
  than n.

  It is known that H(n) >= k_n, where k_1 = 1 and
  k_n = floor(n/2) + k_floor(n/2) + k_floor((n+1)/2).

  Improve this lower bound by a constant factor: prove H(n) >= c*k_n for some
  constant c > 1. The improvement may fail for small n, but it must already be
  visible at n = 15.

  Give an explicit algorithm that takes n as input and outputs a witness
  hypergraph. The output should be a string with vertices labeled
  1, ..., |V| and edges written with curly braces, for example:
  {1,2,3},{2,4},{3,4,5},{1,5}.
problem_framing_notes: |
  This is the FrontierMath full-problem variant. The prover should produce both
  an explicit construction algorithm and the mathematical proof that the output
  has no isolated vertices, has no partition larger than n, and beats the
  recursive lower bound by a fixed factor.

# golden_proof 只给 EVAL, 不给 PROVER。
golden_proof:
  primary: "https://epoch.ai/frontiermath/open-problems/ramsey-hypergraphs"
  companions:
    - "Epoch AI FrontierMath problem page: A Ramsey-style Problem on Hypergraphs"
    - "math-inc/FrontierMathOpen-Hypergraphs Lean formalization and paper source"
    - "Brian and Larson, Choosing between incompatible ideals, European Journal of Combinatorics 96 (2021)"
  proof_text: |
    Reference solution outline:
    1. Define the unique-coverage functional u_G(P), counting vertices covered
       by exactly one chosen edge. A hypergraph has no partition of size greater
       than n iff u_G(P) <= n for every edge subfamily P.
    2. Introduce support gadgets/frames on a small meta-ground-set. A frame with
       capacities (n_1,...,n_t) is a finite support multiset whose every chosen
       subfamily respects the corresponding capacity inequality.
    3. Prove the substitution theorem: replacing each meta-point i by a smaller
       witness G_i turns a valid frame into a larger hypergraph with no partition
       larger than n_1+...+n_t. Vertex counts add according to the supports.
    4. Build a finite bank of exact small frames and several higher-arity
       boosters. Exhaustively verify the frame inequalities for these explicit
       gadgets.
    5. Use a finite bootstrap for n < 60 and a balanced four-way recursive
       construction for n >= 60. The large-n recursion uses a fixed four-way core
       plus residue gadgets, so the multiplicative gain propagates indefinitely.
    6. Prove by induction that the generated G_n has exactly n distinct edges,
       no isolated vertices, no partition of size greater than n, and at least
       (26/25) k_n vertices for every n >= 15.
    7. Provide the verifier-facing Python constructor solution(n). It uses only
       hard-coded finite tables and deterministic recursion, not search at
       runtime. A valid answer may give a different construction, but it must be
       explicit, verifiable, and must prove a fixed c > 1 already active at n=15.

rubric:
  - id: R1
    title: "Correctly formalizes H(n), partitions, and k_n"
    criterion: "Defines the unique-cover partition condition, the extremal function H(n), and the recursive benchmark k_n without changing the problem."
    frontier_delta: false
    indicators: ["unique coverage", "partition of size", "recursive benchmark"]
  - id: R2
    title: "Gives a compositional substitution principle"
    criterion: "Introduces a reusable meta-gadget/frame mechanism and proves that substituting smaller witnesses preserves the no-large-partition property."
    frontier_delta: true
    indicators: ["support-gadget substitution", "frame capacities", "substitution theorem"]
  - id: R3
    title: "Verifies explicit finite gadgets"
    criterion: "Uses explicit finite frames/boosters and checks their capacity inequalities rather than relying on an unverified search claim."
    frontier_delta: true
    indicators: ["exact small frames", "higher-arity boosters", "finite gadget verification"]
  - id: R4
    title: "Closes the uniform improvement for all large n"
    criterion: "Provides a recursive family that propagates the constant-factor gain for all sufficiently large n."
    frontier_delta: true
    indicators: ["balanced four-way", "residue gadgets", "large-n recursion"]
  - id: R5
    title: "Handles the n=15 finite threshold"
    criterion: "Shows the improvement is already active at n=15 and covers the finite bootstrap window before the asymptotic recursion starts."
    frontier_delta: true
    indicators: ["26/25", "finite bootstrap", "n=15"]
  - id: R6
    title: "Provides an explicit verifier-facing constructor"
    criterion: "Gives an algorithm or Python function that outputs witness hypergraphs and proves the output has the claimed edge, vertex, and partition properties."
    frontier_delta: true
    indicators: ["solution(n)", "hard-coded tables", "witness hypergraph"]

