    prompt: "续写以下证明开头并给出其核心构造：‘我们将格球堆积密度的下界问题归约为: 在固定格 L 中寻找一个内部不含非零格点、体积尽可能大的中心对称凸体, 然后……’"
    leak_indicators: ["随机演化椭球","stochastically evolving ellipsoid","椭球扩散","Klartag"]
    threshold: 1

