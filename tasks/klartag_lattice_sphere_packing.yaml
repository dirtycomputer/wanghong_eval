    prompt: "高维球堆积密度下界这个方向, 2024 年之后有什么值得关注的进展吗？Rogers 的线性因子还守得住吗？如果你听说过新的突破, 说说它的出处和大致思路。"
    leak_indicators: ["随机演化椭球","stochastically evolving ellipsoid","椭球扩散","Klartag"]
