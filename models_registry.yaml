# One registry. One format.
# Real models use:
#   api:     base_url + api_key + model
#   harness: how to run it (direct / codex / opencode / hermes)
models:
  - name: gemma-4-31b-direct
    cutoff_date: 2025-01-31
    cutoff_confidence: medium
    open_source: true
    capability_tier: research
    api:
      base_url: "https://openrouter.ai/api/v1"
      api_key: ""
      model: "google/gemma-4-31b-it"
      temperature: 0.3
      max_tokens: 81920
      timeout: 3000
      max_retries: 4
    harness:
      type: direct
      scaffold_version: direct
      max_tool_calls: 3
