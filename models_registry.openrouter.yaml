# OpenRouter 真实后端 registry (用 `--registry models_registry.openrouter.yaml`)。
#
# gemma-4-31b-it 的官方 cutoff 是 "January 2025" (模型卡:
# https://huggingface.co/google/gemma-4-31B-it — pre-training cutoff date of January 2025)。
# 这早于 Wang–Zahl 三维 Kakeya 突破 (arXiv 2502.17655, 2025-02-25), 所以它在训练里
# 不可能见过那篇证明 —— 这也解释了为什么它的污染探针全部 clean。因此它是王虹测试的
# 一个 (边界) 合法 pre-breakthrough PROVER 候选。
#
# 注意 (plan §10.6 "突破日期本身模糊"): cutoff 是厂商宣称的"软"日期, 取月末 2025-01-31
# 作为保守上界; 距 preprint 约 25 天 buffer。探针实测是最终判据 (plan §6.2/§8), 实跑探针
# 已通过。confidence 标 medium。
#
# API key 从环境变量 OPENROUTER_KEY 读取, 不写进任何文件。
#
# 同一模型 × 三个 harness (plan §7: harness = model + scaffold + toolset):
#   gemma-4-31b          纯模型 + search_arxiv 工具 (OpenRouter 原生 tool-calling)
#   gemma-4-31b-opencode opencode CLI harness (冻结 arXiv MCP, 禁 webfetch/websearch/bash)
#   gemma-4-31b-hermes   Hermes Agent harness (冻结 arXiv MCP, toolsets 清空, 每 job 隔离 HOME)
# 三者的探针都直连裸模型 (污染是模型属性, 与 harness 无关)。
models:
  - name: gemma-4-31b
    cutoff_date: 2025-01-31          # 模型卡 "January 2025" 的保守上界 (月末)
    cutoff_confidence: medium        # 厂商宣称, 软 cutoff
    open_source: true
    capability_tier: research
    provider: openrouter
    backend_kwargs:
      model: "google/gemma-4-31b-it"
      scaffold_version: "openrouter"
      max_tool_calls: 3
      temperature: 0.3
      max_tokens: 8192      # 实测 gemma 证明 ~2k tok, 8192 防截断 (provider 须支持 tools)
      probe_max_tokens: 400

  - name: gemma-4-31b-opencode
    cutoff_date: 2025-01-31
    cutoff_confidence: medium
    open_source: true
    capability_tier: research
    provider: opencode
    backend_kwargs:
      model: "google/gemma-4-31b-it"
      scaffold_version: "opencode"
      probe_max_tokens: 400
      timeout_seconds: 1800

  - name: gemma-4-31b-hermes
    cutoff_date: 2025-01-31
    cutoff_confidence: medium
    open_source: true
    capability_tier: research
    provider: hermes
    backend_kwargs:
      model: "google/gemma-4-31b-it"
      scaffold_version: "hermes"
      probe_max_tokens: 400
      timeout_seconds: 1800
